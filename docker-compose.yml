services:
  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      torro:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80"]
      interval: 10s
      timeout: 5s
      retries: 3

  torro:
    build:
      context: .
      dockerfile: Dockerfile
    expose:
      - "3000"
    environment:
      - QBIT_URL=http://qbittorrent:8080
      - DOWNLOADS_PATH=/downloads
      - NODE_ENV=production
    volumes:
      - downloads:/downloads
      - ./.env:/run/config/.env:ro
    depends_on:
      qbittorrent:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  qbittorrent:
    image: linuxserver/qbittorrent:latest
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=UTC
      - WEBUI_PORT=8080
    volumes:
      - downloads:/downloads
      - qbit_config:/config
    ports:
      - "9090:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  downloads:
  qbit_config:
