services:
  traefik:
    image: traefik:v3
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    command:
      - --entrypoints.web.address=:80
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --entrypoints.websecure.address=:443
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --certificatesresolvers.le.acme.email=${ACME_EMAIL}
      - --certificatesresolvers.le.acme.storage=/acme.json
      - --certificatesresolvers.le.acme.tlschallenge=true
      - --ping=true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/acme.json:/acme.json
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  torro:
    image: ${DOCKER_REPO}/torro:${TORRO_VERSION:-latest}
    expose:
      - "3000"
    environment:
      - QBIT_URL=http://qbittorrent:8080
      - DOWNLOADS_PATH=/downloads
      - NODE_ENV=production
    volumes:
      - downloads:/downloads
      - ./.env:/run/config/.env:ro
    depends_on:
      qbittorrent:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    labels:
      - traefik.enable=true
      - traefik.http.routers.torro.rule=Host(`${DOMAIN}`)
      - traefik.http.routers.torro.entrypoints=websecure
      - traefik.http.routers.torro.tls.certresolver=le
      - traefik.http.services.torro.loadbalancer.server.port=3000

  qbittorrent:
    image: linuxserver/qbittorrent:latest
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=UTC
      - WEBUI_PORT=8080
    volumes:
      - downloads:/downloads
      - qbit_config:/config
    # Not exposed publicly — access via SSH tunnel if needed:
    # ssh -L 9090:localhost:8080 user@yourserver
    expose:
      - "8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  downloads:
  qbit_config:
